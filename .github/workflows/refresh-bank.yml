name: Refresh passage bank

# Regenerates the weekly passage bank every Monday. Runs with --live: when the
# ANTHROPIC_API_KEY repository secret is set, fresh AI passages are generated
# by the current frontier model and honestly stamped with its name; when the
# secret is absent the generator warns and falls back to the curated offline
# pool, so the workflow works either way (see docs/PIPELINE.md).

on:
  schedule:
    # 07:00 UTC every Monday — start of the ISO week.
    - cron: "0 7 * * 1"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      # Generate this ISO week's bank. Fails loudly (non-zero exit, no partial
      # write) if fewer than 10 valid passages or fewer than 4 styles.
      - name: Generate bank
        run: npm run generate-bank -- --live
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Belt-and-suspenders: re-validate whatever landed on disk this run.
      - name: Validate generated banks
        run: |
          for f in src/data/banks/*.json; do
            node scripts/validate-bank.mjs "$f"
          done

      - name: Commit new bank
        run: |
          git config user.name "ctkrug"
          git config user.email "ctkrug4501@gmail.com"
          if git diff --quiet; then
            echo "No new bank to commit this week."
            exit 0
          fi
          git add src/data/banks
          git commit -m "chore(data): refresh weekly passage bank"
          git push
